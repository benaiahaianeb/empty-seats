name: Refresh T-100 data
on:
  schedule:
    - cron: "17 9 15 * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pandas requests
      - name: Rebuild index.html from latest BTS data
        run: python refresh_data.py
      - name: Commit if changed
        run: |
          git config user.name "atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html data/oo_dl_share.csv
          if git diff --cached --quiet; then
            echo "No data changes this month."
          else
            git commit -m "Data refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
